name: DiffBio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_PYTEST_MARKERS: "not gpu and not gpu_required and not cuda and not slow and not network and not scbench and not spatialbench"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: quality
          linux-editable-target: ".[dev]"

      - name: Run Ruff
        run: uv run ruff check --output-format=github

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint imports (architecture contracts)
        run: uv run lint-imports

  unit_tests:
    name: Unit Tests (${{ matrix.shard.id }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Sharded by test path to keep wall-clock time per runner bounded.
          # Keep these in sync with the local test layout so no shard becomes
          # the long pole (review when test counts change appreciably).
          - id: core-and-misc
            paths: >-
              tests/core
              tests/sources
              tests/splitters
              tests/samplers
              tests/sequences
              tests/utils
              tests/pipelines
              tests/losses
            extra: >-
              --ignore=tests/integration
              --ignore=tests/benchmarks
          - id: operators-singlecell
            paths: tests/operators/singlecell
            extra: ""
          - id: operators-rest
            paths: tests/operators
            extra: --ignore=tests/operators/singlecell

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: unit-${{ matrix.shard.id }}
          linux-editable-target: ".[dev,test]"

      - name: Run unit tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
          SHARD_PATHS: ${{ matrix.shard.paths }}
          SHARD_EXTRA: ${{ matrix.shard.extra }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          # No coverage here — coverage is collected once in the dedicated
          # `coverage` job. Bare unit shards run fast and report results.
          # shellcheck disable=SC2086
          uv run pytest ${SHARD_PATHS} \
            -m "${PYTEST_MARKERS} and not e2e and not benchmark and not performance and not integration" \
            ${SHARD_EXTRA} \
            -n auto --dist worksteal \
            --no-cov

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.shard.id }}
          path: |
            test-results/
            temp/test-results.json
          include-hidden-files: true
        if: always()

  integration_tests:
    name: Integration Tests
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: integration
          linux-editable-target: ".[dev,test]"

      - name: Run integration tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          uv run pytest tests/integration/ -m "${PYTEST_MARKERS}" \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: integration
          fail_ci_if_error: false
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            .coverage
            coverage.xml
            test-results/
          include-hidden-files: true
        if: always()

  e2e_tests:
    name: End-to-End Tests
    needs: integration_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: e2e
          linux-editable-target: ".[dev,test]"

      - name: Run end-to-end tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          uv run pytest tests/ -m "e2e and ${PYTEST_MARKERS}" \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: e2e
          fail_ci_if_error: false
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            .coverage
            coverage.xml
            test-results/
          include-hidden-files: true
        if: always()

  performance_tests:
    name: Performance Tests
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: perf
          linux-editable-target: ".[dev,test,benchmark]"

      - name: Run performance tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          uv run pytest tests/ -v -m "(benchmark or performance) and ${PYTEST_MARKERS}" \
            --benchmark-autosave --benchmark-columns=mean,stddev,min,max --no-cov

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results/
            benchmark.json
            histogram.svg
        if: always()

  coverage:
    name: Test Coverage
    needs: [unit_tests, integration_tests, e2e_tests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: coverage
          linux-editable-target: ".[dev,test]"

      - name: Run full unit suite with coverage
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          uv run pytest tests/ \
            -m "${PYTEST_MARKERS} and not e2e and not benchmark and not performance" \
            --ignore=tests/benchmarks \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: coverage.xml
        if: always()
