name: DiffBio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_PYTEST_MARKERS: "not gpu and not gpu_required and not cuda and not slow and not network and not scbench and not spatialbench"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: quality
          linux-editable-target: ".[dev]"

      - name: Run Ruff
        run: uv run ruff check --output-format=github

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint imports (architecture contracts)
        run: uv run lint-imports

  unit_tests:
    name: Unit Tests (${{ matrix.shard.id }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Sharded by test path to keep wall-clock time per runner bounded.
          # Keep these in sync with the local test layout so no shard becomes
          # the long pole (review when test counts change appreciably).
          - id: core-and-misc
            paths: >-
              tests/core
              tests/sources
              tests/splitters
              tests/samplers
              tests/sequences
              tests/utils
              tests/pipelines
              tests/losses
            extra: >-
              --ignore=tests/integration
              --ignore=tests/benchmarks
          - id: operators-singlecell
            paths: tests/operators/singlecell
            extra: ""
          - id: operators-a
            paths: >-
              tests/operators/alignment
              tests/operators/assembly
              tests/operators/crispr
              tests/operators/drug_discovery
              tests/operators/epigenomics
              tests/operators/foundation_models
            extra: ""
          - id: operators-b
            paths: >-
              tests/operators/mapping
              tests/operators/metabolomics
              tests/operators/molecular_dynamics
              tests/operators/multiomics
              tests/operators/normalization
              tests/operators/population
              tests/operators/preprocessing
              tests/operators/protein
              tests/operators/rna_structure
              tests/operators/rnaseq
              tests/operators/statistical
              tests/operators/variant
            extra: ""
          - id: operators-toplevel
            paths: tests/operators
            extra: >-
              --ignore=tests/operators/alignment
              --ignore=tests/operators/assembly
              --ignore=tests/operators/crispr
              --ignore=tests/operators/drug_discovery
              --ignore=tests/operators/epigenomics
              --ignore=tests/operators/foundation_models
              --ignore=tests/operators/language_models
              --ignore=tests/operators/mapping
              --ignore=tests/operators/metabolomics
              --ignore=tests/operators/molecular_dynamics
              --ignore=tests/operators/multiomics
              --ignore=tests/operators/normalization
              --ignore=tests/operators/population
              --ignore=tests/operators/preprocessing
              --ignore=tests/operators/protein
              --ignore=tests/operators/rna_structure
              --ignore=tests/operators/rnaseq
              --ignore=tests/operators/singlecell
              --ignore=tests/operators/statistical
              --ignore=tests/operators/variant

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: unit-${{ matrix.shard.id }}
          # Install genomics extra so pyfaidx / pysam are present for the
          # error-path tests in tests/sources/test_{fasta,bam}.py.
          linux-editable-target: ".[dev,test,genomics]"

      - name: Run unit tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
          SHARD_PATHS: ${{ matrix.shard.paths }}
          SHARD_EXTRA: ${{ matrix.shard.extra }}
          # Per-shard coverage data file so parallel shards don't collide
          # when their .coverage files are combined later by the
          # `coverage` job via `coverage combine`.
          COVERAGE_FILE: .coverage.${{ matrix.shard.id }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          # shellcheck disable=SC2086
          uv run pytest ${SHARD_PATHS} \
            -m "${PYTEST_MARKERS} and not e2e and not benchmark and not performance and not integration" \
            ${SHARD_EXTRA} \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report= --cov-fail-under=0

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.shard.id }}
          path: .coverage.${{ matrix.shard.id }}
          include-hidden-files: true
          if-no-files-found: error
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.shard.id }}
          path: |
            test-results/
            temp/test-results.json
          include-hidden-files: true
        if: always()

  integration_tests:
    name: Integration Tests
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: integration
          linux-editable-target: ".[dev,test]"

      - name: Run integration tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
          COVERAGE_FILE: .coverage.integration
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          uv run pytest tests/integration/ -m "${PYTEST_MARKERS}" \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report= --cov-fail-under=0

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-integration
          path: .coverage.integration
          include-hidden-files: true
          if-no-files-found: error
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
          include-hidden-files: true
        if: always()

  e2e_tests:
    name: End-to-End Tests
    needs: integration_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: e2e
          linux-editable-target: ".[dev,test]"

      - name: Run end-to-end tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
          COVERAGE_FILE: .coverage.e2e
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          ec=0
          uv run pytest tests/ -m "e2e and ${PYTEST_MARKERS}" \
            -n auto --dist worksteal \
            --cov=src/diffbio --cov-report= --cov-fail-under=0 \
            || ec=$?
          # Treat pytest exit code 5 ("no tests collected") as success, so this
          # placeholder job remains green until tests are actually marked @e2e.
          if [ "$ec" -eq 5 ]; then
            echo "::notice::No tests matched the e2e marker filter; treating as success."
            # Emit an empty coverage file so the upload step has something to
            # consume; coverage combine ignores empty files cleanly.
            : > .coverage.e2e
            exit 0
          fi
          exit "$ec"

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-e2e
          path: .coverage.e2e
          include-hidden-files: true
          if-no-files-found: ignore
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            .coverage
            coverage.xml
            test-results/
          include-hidden-files: true
        if: always()

  performance_tests:
    name: Performance Tests
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: perf
          linux-editable-target: ".[dev,test,benchmark]"

      - name: Run performance tests
        shell: bash
        env:
          PYTEST_MARKERS: ${{ env.CI_PYTEST_MARKERS }}
        run: |
          set -euo pipefail
          export JAX_PLATFORMS="cpu"
          ec=0
          uv run pytest tests/ -v -m "(benchmark or performance) and ${PYTEST_MARKERS}" \
            --benchmark-autosave --benchmark-columns=mean,stddev,min,max --no-cov \
            || ec=$?
          # Treat pytest exit code 5 ("no tests collected") as success, so this
          # placeholder job remains green until tests are actually marked
          # @benchmark / @performance.
          if [ "$ec" -eq 5 ]; then
            echo "::notice::No tests matched the benchmark/performance marker filter; treating as success."
            exit 0
          fi
          exit "$ec"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results/
            benchmark.json
            histogram.svg
        if: always()

  coverage:
    name: Test Coverage
    needs: [unit_tests, integration_tests, e2e_tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up DiffBio
        uses: ./.github/actions/setup-diffbio
        with:
          python-version: "3.11"
          cache-suffix: coverage
          linux-editable-target: ".[dev,test,genomics]"

      - name: Download all coverage data artifacts
        uses: actions/download-artifact@v4
        with:
          # Pulls every artifact whose name starts with `coverage-data-`,
          # one per shard / integration / e2e job. Each contains a single
          # `.coverage.<id>` file named uniquely by COVERAGE_FILE.
          pattern: coverage-data-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Combine coverage and report
        shell: bash
        run: |
          set -euo pipefail
          ls -la coverage-artifacts/ || true
          # `coverage combine` accepts a list of files or a directory; pass
          # individual files so each shard's data set is merged. Skip any
          # zero-byte placeholder files (the e2e job emits one when no e2e
          # tests are collected).
          shopt -s nullglob
          datafiles=()
          for f in coverage-artifacts/.coverage.*; do
            if [ -s "$f" ]; then
              datafiles+=("$f")
            fi
          done
          if [ "${#datafiles[@]}" -eq 0 ]; then
            echo "::warning::No non-empty coverage data files found; skipping combine."
            exit 0
          fi
          uv run coverage combine "${datafiles[@]}"
          uv run coverage report
          uv run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: coverage.xml
        if: always()
