site_name: DiffBio
site_description: End-to-end differentiable bioinformatics pipelines built on JAX/Flax and Datarax, providing differentiable implementations of sequence alignment, variant calling, and genomic analysis
site_author: Mahdi Shafiei
site_url: https://docs.avitai.bio/diffbio
repo_url: https://github.com/mahdi-shafiei/DiffBio
repo_name: mahdi-shafiei/DiffBio
edit_uri: edit/main/docs/

# Configuration for clean, scientific appearance
theme:
  name: material
  language: en

  palette:
    # Light mode with automatic detection
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode with automatic detection
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # Navigation features with collapsible sections
    - navigation.path
    - navigation.top
    # Instant loading for better UX
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    # Enable navigation tracking
    - navigation.tracking
    # Table of contents
    - toc.follow
    # Search features
    - search.highlight
    - search.share
    - search.suggest
    # Content features
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Enable Mermaid diagram support
    - content.mermaid

  icon:
    repo: fontawesome/brands/github
    logo: "material/dna"  # Bioinformatics/DNA icon

  font:
    text: Roboto
    code: Roboto Mono

  favicon: "_static/favicon.png"

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mahdi-shafiei/DiffBio
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/diffbio/

# Navigation structure for DiffBio
nav:
  - Home: index.md

  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Core Concepts: getting-started/core-concepts.md

  - User Guide:
      - Concepts:
          - Differentiable Bioinformatics: user-guide/concepts/differentiable-bioinformatics.md
          - Sequence Alignment: user-guide/concepts/sequence-alignment.md
          - Variant Calling: user-guide/concepts/variant-calling.md
          - Pileup Generation: user-guide/concepts/pileup-generation.md
      - Operators:
          - Overview: user-guide/operators/overview.md
          - Smith-Waterman: user-guide/operators/smith-waterman.md
          - Pileup Operator: user-guide/operators/pileup.md
          - Quality Filter: user-guide/operators/quality-filter.md
      - Pipelines:
          - Pipeline Overview: user-guide/pipelines/overview.md
          - Variant Calling Pipeline: user-guide/pipelines/variant-calling.md
      - Training:
          - Training Overview: user-guide/training/overview.md
          - Training Utilities: user-guide/training/utilities.md

  - API Reference:
      - Core:
          - Base Classes: api/core/base.md
          - Configuration: api/core/configuration.md
      - Operators:
          - Smith-Waterman: api/operators/smith-waterman.md
          - Pileup: api/operators/pileup.md
          - Quality Filter: api/operators/quality-filter.md
      - Pipelines:
          - Variant Calling: api/pipelines/variant-calling.md
      - Utils:
          - Training Utilities: api/utils/training.md

  - Design Documents:
      - End-to-End Differentiable Pipelines: design-docs/differentiable-pipelines.md

  - Examples:
      - Overview: examples/overview.md
      - Basic:
          - Simple Alignment: examples/basic/simple-alignment.md
          - Pileup Generation: examples/basic/pileup-generation.md
      - Advanced:
          - Variant Calling Pipeline: examples/advanced/variant-calling.md

  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md

# Plugins configuration
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_submodules: true
            show_source: false
            show_bases: true
            show_inheritance_diagram: false
            group_by_category: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            show_if_no_docstring: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            filters:
              - "!^_"
              - "^__init__$"
            inherited_members: true

# Markdown extensions for scientific/bioinformatics content
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¤"
      title: "On this page"
      toc_depth: 4
  # PyMdown Extensions for enhanced formatting
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# MathJax for scientific/bioinformatics equations
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Custom CSS
extra_css:
  - _static/extra.css

# Build configuration
strict: false
docs_dir: docs
site_dir: site

# File watching configuration for development
watch:
  - src/diffbio/
  - docs/
  - mkdocs.yml
  - README.md
