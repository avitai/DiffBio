site_name: DiffBio
site_description: End-to-end differentiable bioinformatics pipelines built on JAX/Flax and Datarax, providing differentiable implementations of sequence alignment, variant calling, and genomic analysis
site_author: Mahdi Shafiei
site_url: https://docs.avitai.bio/diffbio
repo_url: https://github.com/mahdi-shafiei/DiffBio
repo_name: mahdi-shafiei/DiffBio
edit_uri: edit/main/docs/

# Configuration for clean, scientific appearance
theme:
  name: material
  language: en

  palette:
    # Light mode with automatic detection
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode with automatic detection
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # Navigation features with collapsible sections
    - navigation.path
    - navigation.top
    # Instant loading for better UX
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    # Enable navigation tracking
    - navigation.tracking
    # Table of contents
    - toc.follow
    # Search features
    - search.highlight
    - search.share
    - search.suggest
    # Content features
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Enable Mermaid diagram support
    - content.mermaid

  icon:
    repo: fontawesome/brands/github
    logo: "material/dna"  # Bioinformatics/DNA icon

  font:
    text: Roboto
    code: Roboto Mono

  favicon: "_static/favicon.png"

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mahdi-shafiei/DiffBio
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/diffbio/

