# DiffBio Pre-commit Configuration
# Based on workshop-data patterns for thorough code quality

repos:
  # TOML formatting
  - repo: local
    hooks:
      - id: sort_pyproject
        name: sort_pyproject
        entry: toml-sort
        language: python
        args: [-i, --sort-table-keys, --sort-inline-tables, pyproject.toml]
        files: ^pyproject\.toml$
        additional_dependencies: ["toml-sort==0.23.1"]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(memory-bank)/
      - id: end-of-file-fixer
        exclude: ^(memory-bank)/
      - id: check-yaml
        exclude: ^(memory-bank)/(.*)|mkdocs\.yml$
      - id: check-added-large-files
        args: ["--maxkb=2000"]
        exclude: ^(memory-bank)/
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
        exclude: ^(memory-bank)/
      - id: debug-statements
        exclude: ^(memory-bank)/
      - id: mixed-line-ending
        exclude: ^(memory-bank)/

  # Python linting and formatting with auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
        exclude: ^(memory-bank)/
        types_or: [python, pyi, jupyter, toml]
      - id: ruff-format
        types_or: [python, pyi, jupyter, toml]
        exclude: ^(memory-bank)/

  # GitHub Actions simulation
  - repo: local
    hooks:
      - id: ruff-docstring-whitespace
        name: ruff-docstring-whitespace (auto-fix whitespace)
        entry: ruff check --select=W291,W292,W293,F841 --fix --unsafe-fixes
        language: system
        types: [python]
        exclude: ^(memory-bank)/
        pass_filenames: true
      - id: ruff-github-actions-check
        name: ruff-github-actions-check (mirrors CI)
        entry: uv run ruff check --output-format=github
        language: system
        types: [python]
        exclude: ^(memory-bank)/
        pass_filenames: false
        always_run: true
      - id: ruff-critical-check
        name: ruff-critical-check (fast CI-critical rules only)
        # F821 excluded due to false positives from jaxtyping dimension annotations
        entry: uv run ruff check --select=RUF005,B904,F822,F823 --output-format=github
        language: system
        types: [python]
        exclude: ^(memory-bank)/
        pass_filenames: false
        always_run: true

  # Type checking with JAX ecosystem support
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.403
    hooks:
      - id: pyright
        args: ["--warnings"]
        exclude: ^(memory-bank)/
        additional_dependencies: [
            # Core JAX ecosystem
            beartype,
            jax,
            flax,
            jaxtyping,
            typing_extensions,
            optax,
            chex,
            orbax-checkpoint,

            # Scientific libraries
            numpy,
            scipy,

            # Bioinformatics
            biopython,

            # Development
            pytest,
          ]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: ^(memory-bank|tests)/
        additional_dependencies: ["bandit[toml]"]
        log_file: /dev/null

  # Documentation quality
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: ^(memory-bank|tests|.deprecated|examples)/
        additional_dependencies: ["pydocstyle[toml]"]
        args: ["--config=pyproject.toml"]

  # Architecture and code quality gates from SWE standards
  - repo: local
    hooks:
      - id: lint-imports
        name: lint-imports (architecture contracts)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true
      - id: radon-complexity
        name: radon-complexity (cyclomatic complexity)
        entry: uv run radon cc src -a -nc
        language: system
        pass_filenames: false
        always_run: true
      - id: interrogate
        name: interrogate (docstring coverage)
        entry: uv run interrogate src -v
        language: system
        pass_filenames: false
        always_run: true

  # Notebook quality
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        exclude: ^(memory-bank)/
        args: [--fix]

  # Shell script quality
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: ^(memory-bank)/
        args: ["-e", "SC1091"]
        pass_filenames: true
        always_run: false

  # File length check
  - repo: local
    hooks:
      - id: check-file-length
        name: Check file length
        entry: "bash -c 'for f in \"$@\"; do lines=$(wc -l < \"$f\"); if [ \"$lines\" -gt 2000 ]; then echo \"FAIL: $f has $lines lines (max 2000)\"; exit 1; elif [ \"$lines\" -gt 1500 ]; then echo \"WARN: $f has $lines lines (consider splitting)\"; fi; done'"
        language: system
        types: [python]
        exclude: ^(memory-bank)/

# CI configuration - no autofix, manual testing before commits
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: false
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
